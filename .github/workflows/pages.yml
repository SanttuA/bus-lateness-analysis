name: Validate and deploy public report

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Activate pinned pnpm
        run: corepack install

      - name: Install frontend dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install uv
        run: python3 -m pip install uv==0.11.26

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Install Python dependencies
        run: uv sync --locked

      - name: Run Python tests
        run: uv run python -m unittest discover -v

      - name: Check formatting
        run: corepack pnpm format:check

      - name: Lint frontend
        run: corepack pnpm lint

      - name: Type-check frontend
        run: corepack pnpm typecheck

      - name: Run unit tests with coverage
        run: corepack pnpm test:coverage

      - name: Build production site
        run: corepack pnpm build

      - name: Install Playwright browsers
        run: corepack pnpm --dir site exec playwright install --with-deps chromium firefox webkit

      - name: Run browser and accessibility tests
        run: corepack pnpm e2e

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site/dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
